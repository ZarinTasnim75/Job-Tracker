<!doctype html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>

    <!-- tailwind+ daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- outfit fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />

    <!-- icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] min-h-screen">
    <div class="px-4 sm:px-6 lg:px-24 py-10">
        <h2 class="text-2xl font-bold">Job Application Tracker</h2>

        <div class="card-container grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-7">
            <div class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <h2 class="card-title font-light">Total</h2>
                    <p class="font-bold text-3xl">8</p>
                </div>
            </div>
            <div class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <h2 class="card-title font-light">Interview</h2>
                    <p class="font-bold text-3xl text-green-500">0</p>
                </div>
            </div>
            <div class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <h2 class="card-title font-light">Rejected</h2>
                    <p class="font-bold text-3xl text-red-500">0</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
